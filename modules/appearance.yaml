- repo: kyazdani42/nvim-web-devicons

- repo: Akin909/nvim-bufferline.lua
  depends: nvim-web-devicons
  hook_add: |
    lua << EOF
    require'bufferline'.setup{
        options = {
          modified_icon = '✥',
          buffer_close_icon = '',
          mappings = true,
          always_show_bufferline = false,
        };
        highlights = {
          bufferline_selected = {
            gui = "bold",
          };
        };
      }
    EOF

- repo: glepnir/galaxyline.nvim

- repo: glepnir/oceanic-material
  hook_source: |
    set background=dark
    colorscheme oceanic_material

- repo: glepnir/dashboard-nvim
  hook_source: |
    let g:dashboard_preview_command = 'cat'
    let g:dashboard_preview_file = getenv('HOME') . '/.config/nvim/neovim.cat'
    let g:dashboard_preview_file_height = 10
    let g:dashboard_preview_file_width = 80
    let g:dashboard_default_executive ='Clap'
    let g:dashboard_custom_section = {
      \ 'last_session'        :{
          \ 'description': ['  Recently laset session                  SPC s l'],
          \ 'command': 'SessionLoad'},
      \ 'find_history'        :{
          \ 'description': ['  Recently opened files                   SPC f h'],
          \ 'command': 'history'},
      \ 'find_file'           :{
          \ 'description': ['  Find  File                              SPC f f'],
          \ 'command': 'filer'},
      \ 'new_file'            :{
          \ 'description': ['  New   File                              SPC t f'],
          \ 'command': 'filer'},
      \ 'change_colorscheme'  :{
          \ 'description': ['  Change Colorscheme                      SPC t c'],
          \ 'command': 'colors'},
      \ 'find_word'           :{
          \ 'description': ['  Find  word                              SPC f w'],
          \ 'command': 'grep'},
      \}
